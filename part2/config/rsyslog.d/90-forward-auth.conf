# CSC3106 Mini-Project - Part 2 (Group BB)
# Forward web01's auth logging to a separate collector host.
#
# Why this is part of the response: our entire Part 1 analysis - and both
# Part 2 scripts - depend on web01's local auth.log being intact. But the
# incident we found is precisely a case where someone obtained a
# sudo-capable account (`deploy`). A logged-in attacker with root can edit
# or truncate the local log, at which point the detection layer is analysing
# evidence the attacker controls. Shipping a copy off-host as lines are
# written means tampering with web01's own log no longer erases the record;
# the attacker would have to compromise the collector too.
#
# Deploy as /etc/rsyslog.d/90-forward-auth.conf. Replace the placeholder
# with the organisation's log collector / SIEM. The @@ prefix means TCP
# (queued, retried); a single @ would be fire-and-forget UDP.
#
# The queue settings keep up to 100MB of messages on disk if the collector
# is unreachable, instead of silently dropping them - an outage of the
# collector shouldn't blind us.

auth,authpriv.* action(type="omfwd"
    target="logs.example.internal" port="514" protocol="tcp"
    queue.type="LinkedList" queue.filename="auth_fwd"
    queue.maxDiskSpace="100m" queue.saveOnShutdown="on"
    action.resumeRetryCount="-1")
