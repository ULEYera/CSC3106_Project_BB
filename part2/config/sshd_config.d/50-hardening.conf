# CSC3106 Mini-Project - Part 2 (Group BB)
# SSH hardening for web01, driven by what the Part 1 evidence actually shows.
#
# Deploy as /etc/ssh/sshd_config.d/50-hardening.conf (OpenSSH 8.2+ reads
# this directory by default on Ubuntu/Debian). Validate with `sshd -t`
# before reloading, and keep an existing session open while testing -
# these settings can lock you out if a key is missing.

# --- Immediate, zero-cost changes -----------------------------------------

# root was directly guessed 149 times in our extract (109 failed passwords +
# 40 invalid-user notices) and never once logged in legitimately over SSH -
# there is no "Accepted password for root" line anywhere in the 12,000-line
# week. Disabling remote root login therefore breaks nothing and removes the
# single worst-impact guessing target outright. Admins keep root via sudo,
# which is how the log shows they already use it.
PermitRootLogin no

# sshd's default allows 6 auth attempts per connection; our extract shows
# 443 "maximum authentication attempts exceeded" errors, i.e. the campaign
# happily burned the full allowance every connection and reconnected.
# Lowering it doesn't stop reconnects (that's fail2ban's job) but cuts the
# guesses-per-connection a third and generates the failure lines fail2ban
# counts sooner.
MaxAuthTries 3

# Drop unauthenticated connections quickly and cap how many can sit in the
# pre-auth state, so a guessing campaign can't hold sockets open and crowd
# out real admins (the availability consequence we flagged under Risk 2).
LoginGraceTime 30
MaxStartups 10:30:60

# --- Phase two: key-only login for the accounts the campaign targets ------
#
# deploy, webadmin and ops are the three most-targeted usernames in the
# extract AND all hold sudo rights. They currently authenticate with
# passwords daily (330+ accepted password logins each), so this block must
# only be enabled AFTER keys have been issued and tested for each of them -
# enabling it first would lock out the organisation's own admins.
# `deploy` was already compromised once via password guessing; with this
# in place, password guessing against these accounts stops being possible
# at all, rather than merely rate-limited.
#
# Match User deploy,webadmin,ops,sysadmin
#     PasswordAuthentication no
#     AuthenticationMethods publickey
